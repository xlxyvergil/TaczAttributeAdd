# This is an example mods.toml file. It contains the data relating to the loading mods.
# There are several mandatory fields (#mandatory), and many more that are optional (#optional).
# The overall format is standard TOML, and v1.2.0 of the specification is required.
# Note that there are fields (for example: authors) where TOML arrays are used (applies to 1.2.0).
# For more information on the specification, see the link below:
# https://toml.io/en/v1.0.0

modLoader="javafml"
loaderVersion="[47,)"
license="MIT"
issueTrackerURL="https://github.com/xlxyvergil/TaczAttributeAdd/issues"

[[mods]]
modId="taa"
version="1.0.0"
displayName="Tacz Attribute Add"
updateJSONURL="https://github.com/xlxyvergil/TaczAttributeAdd/releases/latest"
displayURL="https://github.com/xlxyvergil/TaczAttributeAdd"
logoFile="logo.png"
credits="Thanks to Tacz and Puffish Skills mods"
authors="xlxyvergil"
description="Adds gun damage attributes to Tacz mod."

# A dependency - use the . to indicate dependency for a specific modid. Dependencies are optional.
[[dependencies.taa]]
    # the modid of the dependency
    modId="forge"
    # Does this dependency have to exist - if not, ordering below must be specified
    mandatory=true
    # The version range of the dependency
    versionRange="[47.4.10,)"
    # An ordering relationship for the dependency - BEFORE or AFTER required if the dependency is not mandatory
    ordering="NONE"
    # Side this dependency is applied on - BOTH, CLIENT or SERVER
    side="BOTH"

# Tacz mod dependency
[[dependencies.taa]]
    modId="tacz"
    mandatory=true
    versionRange="[1.1.4,)"
    ordering="NONE"
    side="BOTH"

